<VirtualHost *:80>

    ServerName localhost

    DocumentRoot /var/www/public

    <Directory /var/www/public>
        AllowOverride All
        Require all granted
    </Directory>

    DirectoryIndex index.php

    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://app:9000/var/www/public/$1 enablereuse=on

</VirtualHost>