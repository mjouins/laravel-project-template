services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod

    # Laravel project will live here
    working_dir: /var/www

    env_file:
      - ./backend/.env.prod

    volumes:
      - ./backend/.env.prod:/var/www/.env
      - public_data:/var/www/public

    depends_on:
      - db

    command: /entrypoint.sh

    networks:
      - laravel

    restart: unless-stopped

  apache:
    build:
      context: ./apache
      dockerfile: Dockerfile

    environment:
      APP_ROOT: /var/www

    ports:
      - '127.0.0.1:8040:80'

    volumes:
      - public_data:/var/www/public
      - ./apache/000-default.conf:/etc/apache2/sites-available/000-default.conf

    depends_on:
      - app

    networks:
      - laravel

    restart: unless-stopped

  db:
    image: docker.io/library/mysql:8.0

    # Load MySQL credentials from .env file
    env_file:
      - ./backend/.env.prod

    # Use native password plugin for compatibility with Laravel's MySQL driver
    command: --default-authentication-plugin=mysql_native_password

    volumes:
      - dbdata:/var/lib/mysql

    networks:
      - laravel

    restart: unless-stopped

# Used for persistent MySQL data, managed by Docker
volumes:
  dbdata:
  public_data:

# Internal Docker network for container communication
networks:
  laravel:
